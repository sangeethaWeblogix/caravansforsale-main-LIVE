name: Generate JSON API Cache

# Pre-warms the Cloudflare KV JSON cache for all 3,462 listing URLs.
# Runs after the main HTML cache generation (generate-cache.yml) so the worker
# has fresh JSON for any page that a user visits before HTML cache regenerates.

on:
  schedule:
    # Run daily at 2 AM Melbourne time (AEST UTC+10 standard time)
    # At UTC+10: 2 AM AEST = 4 PM UTC previous day
    - cron: '0 16 * * *'

  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — parse URLs but skip KV upload'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  generate-json-cache:
    runs-on: ubuntu-latest
    timeout-minutes: 60  # 3,462 URLs ÷ concurrency 5 × ~300ms = ~35 min

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: 📦 Install dependencies
        run: npm install node-fetch@2

      - name: 🗄️ Generate JSON cache
        env:
          WP_API_BASE: 'https://admin.caravansforsale.com.au/wp-json/cfs/v1/new_optimize_code'
          WP_API_KEY: ${{ secrets.WP_API_KEY }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_KV_NAMESPACE_ID: ${{ secrets.CF_KV_NAMESPACE_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: node scripts/generate-json-cache.js

      - name: ✅ Complete
        if: success()
        run: echo "::notice::✅ JSON API cache pre-warmed successfully!"

      - name: ❌ Failed
        if: failure()
        run: echo "::error::JSON API cache generation encountered errors — check logs above."
